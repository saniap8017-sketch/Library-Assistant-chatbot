<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Library</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #2c3e50;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    .book {
      background: #fff;
      padding: 15px;
      margin: 15px 0;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .book h3 {
      margin: 0 0 5px;
    }
    .book p {
      margin: 0;
      color: #555;
    }
  </style>
</head>
<body>

<header>
  <h1>📚 Book Library</h1>
  <p>Explore books and authors easily</p>
</header>

<div class="container">
  <div class="book">
    <h3>Harry Potter</h3>
    <p>Author: J.K. Rowling</p>
  </div>

  <div class="book">
    <h3>The Alchemist</h3>
    <p>Author: Paulo Coelho</p>
  </div>

  <div class="book">
    <h3>Rich Dad Poor Dad</h3>
    <p>Author: Robert Kiyosaki</p>
  </div>
</div>

<!-- Watson Assistant Chatbot -->
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "1ce52ad7-078b-434c-b073-33ca1b8e3005",
    region: "eu-de",
    serviceInstanceID: "63df9709-ade0-491a-a2ce-2ffea9612eef",
    onLoad: async (instance) => { await instance.render(); }
  };
  setTimeout(function(){
    const t=document.createElement('script');
    t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
